services:
  mysql:
    image: mysql:8.0
    container_name: yungwa-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: yungwa
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_USER: yungwa
      MYSQL_PASSWORD: 1234
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql-data: