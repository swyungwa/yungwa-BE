spring:
  profiles:
    active: local

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    defer-datasource-initialization: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 604800000

admin:
  secret-code: ${ADMIN_SECRET_CODE}
